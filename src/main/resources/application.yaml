server:
  port: 8090
spring:
  application:
    name: talktrip-chatting-service
  # spring-session-data-redis 가 있으면 기본으로 HttpSession 이 Redis 로 바뀜. 로컬에서는 Redis 세션 대신 none 유지.
  session:
    store-type: none
  # 채팅 DB: tt/back_end `local` 프로파일과 동일 패턴(MySQL + P6Spy). DB·계정은 tt/docker-compose mysql(talktrip) 기준.
  datasource:
    url: jdbc:p6spy:mysql://localhost:3306/chatDB?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=utf8&useUnicode=true
    username: talktrip
    password: talktrip123
    driver-class-name: com.p6spy.engine.spy.P6SpyDriver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  kafka:
    bootstrap-servers:
      - ${KAFKA_HOST}:9092
      - ${KAFKA_HOST}:19092
      - ${KAFKA_HOST}:19093
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
        spring.json.value.default.type: "java.util.LinkedHashMap"
      auto-offset-reset: earliest
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: false
    baseline-on-migrate: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}



# tt/back_end application.yml 의 jwt.secret-key 와 반드시 동일(또는 동일 JWT_SECRET_KEY 환경 변수).
jwt:
  secret-key: ${JWT_SECRET_KEY:TalkTrip0721SecretKeyUsingJWT1313goormiroom}

chat:
  redis:
    pubsub-prefix: ${CHAT_REDIS_PUBSUB_PREFIX:chat:pub}
    cache-prefix: ${CHAT_REDIS_CACHE_PREFIX:chat:cache}
    presence-prefix: ${CHAT_REDIS_PRESENCE_PREFIX:chat:presence}

kafka:
  topics:
    order-created: order-created
    payment-success: payment-success
